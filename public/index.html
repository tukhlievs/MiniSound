<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MiniSound</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          zIndex: { '60': '60', '70': '70' }
        }
      }
    };
  </script>
  <style>
    :root {
      --bg:       #0B0B0C;
      --surface:  rgba(255,255,255,0.05);
      --border:   rgba(255,255,255,0.07);
      --elevated: #1C1C1E;
      --accent:   #5E81FF;
      --muted:    #8E8E93;
      --header-h: 60px;
      --player-h: 80px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Убираем выделение текста при тапах */
    * { -webkit-tap-highlight-color: transparent; user-select: none; }

    /* Скрываем скроллбары */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Кастомный range input ─────────────────────────────────── */
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; width: 100%; }
    input[type=range]::-webkit-slider-runnable-track { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.14); }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      margin-top: -5.5px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: transform .15s ease;
    }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.35); }

    /* Прогресс поверх трека — через CSS custom property */
    #progressSlider {
      --pct: 0%;
      background: linear-gradient(
        to right,
        var(--accent) var(--pct),
        rgba(255,255,255,0.14) var(--pct)
      );
    }
    #progressSlider::-webkit-slider-runnable-track { background: transparent; }

    /* ── Анимации ──────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes pulse-skeleton {
      0%, 100% { opacity: .45; }
      50%       { opacity: .2;  }
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); }
      50%       { transform: scaleY(1);   }
    }

    .fade-up   { animation: fadeUp  .3s ease forwards; }
    .slide-up  { animation: slideUp .4s cubic-bezier(.32,.72,0,1) forwards; }
    .skeleton  { animation: pulse-skeleton 1.4s ease infinite; }

    /* Нажатие */
    .tap {
      transition: transform .15s ease, opacity .15s ease;
    }
    .tap:active { transform: scale(.94); opacity: .7; }

    /* ── Плеер (full screen sheet) ──────────────────────────────── */
    #fullPlayer {
      transform: translateY(100%);
      transition: transform .42s cubic-bezier(.32,.72,0,1);
    }
    #fullPlayer.open { transform: translateY(0); }

    /* ── Волновой эквалайзер ────────────────────────────────────── */
    .eq-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      transform-origin: bottom;
      animation: wave 1s ease-in-out infinite;
    }
    .eq-bar:nth-child(2) { animation-delay: .15s; }
    .eq-bar:nth-child(3) { animation-delay: .3s;  }
    .eq-bar.paused        { animation-play-state: paused; }

    /* Градиентные заглушки для обложек */
    .g0 { background: linear-gradient(135deg,#1a2e5a,#5e81ff); }
    .g1 { background: linear-gradient(135deg,#3a1550,#c06dd7); }
    .g2 { background: linear-gradient(135deg,#0f3325,#2dd4bf); }
    .g3 { background: linear-gradient(135deg,#4a1010,#f87171); }
    .g4 { background: linear-gradient(135deg,#2a2200,#fbbf24); }
    .g5 { background: linear-gradient(135deg,#0d2b3e,#38bdf8); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Скрытый аудио элемент -->
  <audio id="audioEl" preload="none"></audio>

  <!-- ══════════════════════════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════════════════════════════ -->
  <header id="header"
    class="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-5"
    style="height:var(--header-h);
           padding-top:env(safe-area-inset-top);
           background:rgba(11,11,12,.88);
           backdrop-filter:blur(24px);
           -webkit-backdrop-filter:blur(24px);
           border-bottom:1px solid var(--border);">

    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center"
           style="background:var(--accent);">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M4 12.5V2.5l8 5-8 5z" fill="white"/>
        </svg>
      </div>
      <span class="font-semibold text-[15px] tracking-tight">MiniSound</span>
    </div>

    <button class="tap w-9 h-9 flex items-center justify-center rounded-full"
            style="background:var(--surface);border:1px solid var(--border);"
            onclick="toggleSearch()">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <circle cx="7" cy="7" r="4.5" stroke="var(--muted)" stroke-width="1.4"/>
        <path d="M11.5 11.5L15 15" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- ── Строка поиска (скрыта по умолчанию) ── -->
  <div id="searchBar"
       class="fixed left-0 right-0 z-40 px-4 py-2 hidden"
       style="top:var(--header-h);background:rgba(11,11,12,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);">
    <input id="searchInput" type="search" autocomplete="off" placeholder="Поиск треков и исполнителей..."
      class="w-full px-4 py-2.5 rounded-2xl text-sm outline-none"
      style="background:rgba(255,255,255,0.07);border:1px solid var(--border);color:#fff;caret-color:var(--accent);"
      oninput="onSearch(this.value)" />
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       MAIN SCROLL AREA
  ══════════════════════════════════════════════════════════════════ -->
  <main id="main"
        class="overflow-y-auto hide-scroll"
        style="padding-top:calc(var(--header-h) + 12px);
               padding-bottom:calc(var(--player-h) + env(safe-area-inset-bottom) + 20px);
               min-height:100dvh;">

    <!-- Жанры -->
    <div class="px-4 mb-4">
      <div id="genrePills" class="flex gap-2 overflow-x-auto hide-scroll pb-1"></div>
    </div>

    <!-- Лента треков -->
    <div id="trackList" class="px-4 space-y-2">
      <div id="skeleton"></div>
    </div>

    <!-- Пустое состояние -->
    <div id="emptyState" class="hidden flex-col items-center justify-center py-24 px-6 text-center">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4"
           style="background:var(--surface);">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M6 22V10l14-3v14" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="22" r="2.5" stroke="var(--muted)" stroke-width="1.5"/>
          <circle cx="20" cy="21" r="2.5" stroke="var(--muted)" stroke-width="1.5"/>
        </svg>
      </div>
      <p class="text-base font-semibold">Треков пока нет</p>
      <p class="text-sm mt-1" style="color:var(--muted)">Контент появится совсем скоро</p>
    </div>

  </main>

  <!-- ══════════════════════════════════════════════════════════════
       МИНИ ПЛЕЕР
  ══════════════════════════════════════════════════════════════════ -->
  <div id="miniPlayer"
       class="fixed left-3 right-3 z-50 hidden"
       style="bottom:calc(env(safe-area-inset-bottom) + 10px);">

    <!-- Основная плашка -->
    <div class="flex items-center gap-3 px-3 py-2"
         style="background:rgba(28,28,30,.96);
                backdrop-filter:blur(28px);
                -webkit-backdrop-filter:blur(28px);
                border-radius:20px;
                border:1px solid var(--border);
                box-shadow:0 8px 32px rgba(0,0,0,.55);">

      <!-- Обложка -->
      <div class="relative tap flex-shrink-0" onclick="openFullPlayer()">
        <div id="miniArt"
             class="w-12 h-12 rounded-[14px] overflow-hidden g0 flex-shrink-0"></div>
      </div>

      <!-- Название + исполнитель -->
      <div class="flex-1 min-w-0 tap" onclick="openFullPlayer()">
        <p id="miniTitle"  class="text-[13px] font-semibold truncate leading-tight"></p>
        <p id="miniArtist" class="text-[11px] truncate mt-0.5" style="color:var(--muted)"></p>
      </div>

      <!-- Эквалайзер (виден только при воспроизведении) -->
      <div id="miniEq" class="hidden items-end gap-[3px] h-5 flex-shrink-0">
        <div class="eq-bar h-2"></div>
        <div class="eq-bar h-4"></div>
        <div class="eq-bar h-3"></div>
      </div>

      <!-- Play / Pause -->
      <button id="miniPlayBtn"
              class="tap w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
              style="background:var(--accent);"
              onclick="togglePlay()">
        <svg id="miniPlayIcon" width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M4 2.5l8 5-8 5V2.5z" fill="white"/>
        </svg>
      </button>

      <!-- Next -->
      <button class="tap w-9 h-9 flex items-center justify-center flex-shrink-0" onclick="playNext()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3.5 4.5l8 5.5-8 5.5V4.5z" fill="var(--muted)"/>
          <rect x="13" y="4.5" width="2.5" height="11" rx="1.25" fill="var(--muted)"/>
        </svg>
      </button>
    </div>

    <!-- Полоска прогресса под плашкой -->
    <div class="mx-3 mt-1 h-[2px] rounded-full overflow-hidden"
         style="background:rgba(255,255,255,0.1);">
      <div id="miniProgress"
           class="h-full rounded-full"
           style="width:0%;background:var(--accent);transition:width .3s linear;"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       ПОЛНЫЙ ПЛЕЕР (SHEET)
  ══════════════════════════════════════════════════════════════════ -->
  <div id="fullPlayer"
       class="fixed inset-0 z-[60] flex flex-col"
       style="background:#111113;">

    <!-- Ручка для свайпа -->
    <div class="flex justify-center pt-3 pb-1 tap" onclick="closeFullPlayer()">
      <div class="w-9 h-1 rounded-full" style="background:rgba(255,255,255,0.18);"></div>
    </div>

    <!-- Топбар -->
    <div class="flex items-center justify-between px-5 py-2">
      <button class="tap w-9 h-9 rounded-full flex items-center justify-center"
              style="background:var(--surface);"
              onclick="closeFullPlayer()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5l4 4 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="text-[13px] font-medium" style="color:var(--muted)">Сейчас играет</span>
      <div class="w-9 h-9"></div><!-- placeholder для выравнивания -->
    </div>

    <!-- Обложка -->
    <div class="flex-1 flex items-center justify-center px-8" style="min-height:0;">
      <div id="fullArt"
           class="w-full rounded-3xl overflow-hidden g0"
           style="aspect-ratio:1/1;
                  max-width:320px;
                  max-height:320px;
                  box-shadow:0 24px 64px rgba(0,0,0,.7);"></div>
    </div>

    <!-- Название + исполнитель + лайк -->
    <div class="px-6 mt-5 mb-4 flex items-start justify-between gap-3">
      <div class="flex-1 min-w-0">
        <p id="fullTitle"  class="text-xl font-bold truncate leading-tight"></p>
        <p id="fullArtist" class="text-sm mt-1 truncate" style="color:var(--muted)"></p>
      </div>
      <button id="likeBtn" class="tap flex-shrink-0 mt-0.5" onclick="toggleLike()">
        <svg id="likeIcon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 21C12 21 3 15 3 9a4.5 4.5 0 0 1 9-1 4.5 4.5 0 0 1 9 1c0 6-9 12-9 12Z"
                stroke="var(--muted)" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Прогресс-бар -->
    <div class="px-6 mb-1">
      <input id="progressSlider" type="range" min="0" max="100" value="0"
             oninput="onSeek(this.value)" style="height:3px;" />
      <div class="flex justify-between mt-1">
        <span id="curTime"   class="text-[11px]" style="color:var(--muted)">0:00</span>
        <span id="totalTime" class="text-[11px]" style="color:var(--muted)">0:00</span>
      </div>
    </div>

    <!-- Кнопки управления -->
    <div class="px-5 mb-4">
      <div class="flex items-center justify-between">

        <!-- Shuffle -->
        <button id="shuffleBtn" class="tap w-11 h-11 rounded-full flex items-center justify-center"
                onclick="toggleShuffle()">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M2 7h3l10 8h3M2 15h3l3-2.4" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M14 7h4m0 0-2-2m2 2-2 2" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 15h4m0 0-2-2m2 2-2 2" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Prev -->
        <button class="tap w-14 h-14 rounded-full flex items-center justify-center"
                style="background:var(--surface);" onclick="playPrev()">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M17 3.5L7 11l10 7.5V3.5Z" fill="white"/>
            <rect x="4" y="3.5" width="3" height="15" rx="1.5" fill="white"/>
          </svg>
        </button>

        <!-- Play / Pause (главная кнопка) -->
        <button id="fullPlayBtn"
                class="tap w-20 h-20 rounded-full flex items-center justify-center"
                style="background:var(--accent);box-shadow:0 10px 28px rgba(94,129,255,.45);"
                onclick="togglePlay()">
          <svg id="fullPlayIcon" width="26" height="26" viewBox="0 0 26 26" fill="none">
            <path d="M7 3.5l16 9.5-16 9.5V3.5z" fill="white"/>
          </svg>
        </button>

        <!-- Next -->
        <button class="tap w-14 h-14 rounded-full flex items-center justify-center"
                style="background:var(--surface);" onclick="playNext()">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M5 3.5L15 11 5 18.5V3.5Z" fill="white"/>
            <rect x="15" y="3.5" width="3" height="15" rx="1.5" fill="white"/>
          </svg>
        </button>

        <!-- Repeat -->
        <button id="repeatBtn" class="tap w-11 h-11 rounded-full flex items-center justify-center"
                onclick="toggleRepeat()">
          <svg id="repeatIcon" width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M3 8h14M3 8l2.5-2.5M3 8l2.5 2.5" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 14H5M19 14l-2.5-2.5M19 14l-2.5 2.5" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- Safe area снизу -->
    <div style="height:env(safe-area-inset-bottom);min-height:8px;"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════════════════════════════════ -->
  <script>
    // URL воркера — относительные пути работают т.к. HTML раздаётся тем же Worker
    const API = '';

    const GENRES = [
      { id: 'all',        label: 'Все'        },
      { id: 'pop',        label: 'Pop'        },
      { id: 'rock',       label: 'Rock'       },
      { id: 'hip-hop',    label: 'Hip-Hop'    },
      { id: 'electronic', label: 'Electronic' },
      { id: 'classical',  label: 'Classical'  },
      { id: 'jazz',       label: 'Jazz'       },
      { id: 'lofi',       label: 'Lo-Fi'      },
      { id: 'rnb',        label: 'R&B'        },
    ];

    const state = {
      all:       [],          // все загруженные треки
      filtered:  [],          // после фильтра
      idx:       -1,          // индекс в filtered
      playing:   false,
      shuffle:   false,
      repeat:    false,
      genre:     'all',
      liked:     new Set(JSON.parse(localStorage.getItem('ms_liked') ?? '[]')),
      query:     '',
      seeking:   false,
    };

    // ── Telegram WebApp ──────────────────────────────────────────
    const TG = window.Telegram?.WebApp;
    if (TG) {
      TG.ready();
      TG.expand();
      const bg = TG.themeParams?.bg_color;
      if (bg) { document.documentElement.style.setProperty('--bg', bg); document.body.style.background = bg; }
    }

    function haptic(t = 'light') { TG?.HapticFeedback?.impactOccurred(t); }

    // ── Утилиты ──────────────────────────────────────────────────
    function fmt(sec) {
      if (!sec && sec !== 0) return '';
      const m = Math.floor(sec / 60), s = String(sec % 60 | 0).padStart(2, '0');
      return `${m}:${s}`;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function gClass(i) { return `g${i % 6}`; }

    // Устанавливает содержимое элемента-обложки
    function setArt(el, thumbFileId, idx) {
      if (thumbFileId) {
        el.innerHTML = `<img src="${API}/api/thumbnail/${thumbFileId}"
          class="w-full h-full object-cover"
          onerror="this.parentElement.innerHTML=''; this.parentElement.className='${el.className} ${gClass(idx)}';"
          loading="lazy" alt="" />`;
      } else {
        el.className = el.className.replace(/\bg\d\b/g, '') + ` ${gClass(idx)}`;
        el.innerHTML = '';
      }
    }

    // ── Жанры ────────────────────────────────────────────────────
    function renderGenres() {
      document.getElementById('genrePills').innerHTML = GENRES.map(g => `
        <button class="tap flex-shrink-0 px-4 py-[7px] rounded-full text-[13px] font-medium"
                style="${state.genre === g.id
                  ? 'background:var(--accent);color:#fff;'
                  : 'background:rgba(255,255,255,0.07);color:var(--muted);border:1px solid var(--border);'}"
                onclick="selectGenre('${g.id}')">
          ${g.label}
        </button>`
      ).join('');
    }

    function selectGenre(g) {
      haptic('light');
      state.genre = g;
      renderGenres();
      applyFilter();
    }

    // ── Загрузка ─────────────────────────────────────────────────
    function showSkeleton() {
      document.getElementById('skeleton').innerHTML = Array(6).fill(0).map(() => `
        <div class="skeleton flex items-center gap-3 p-3 rounded-2xl"
             style="background:rgba(255,255,255,0.04);">
          <div class="w-14 h-14 rounded-xl flex-shrink-0" style="background:rgba(255,255,255,0.08);"></div>
          <div class="flex-1 space-y-2">
            <div class="h-3 rounded-full w-3/4" style="background:rgba(255,255,255,0.07);"></div>
            <div class="h-2.5 rounded-full w-1/2" style="background:rgba(255,255,255,0.05);"></div>
          </div>
          <div class="h-2.5 w-10 rounded-full" style="background:rgba(255,255,255,0.05);"></div>
        </div>`
      ).join('');
    }

    async function loadTracks() {
      showSkeleton();
      try {
        const res = await fetch(`${API}/api/tracks?limit=100`);
        state.all = await res.json();
        applyFilter();
      } catch {
        document.getElementById('skeleton').innerHTML = '';
        showEmpty();
      }
    }

    function applyFilter() {
      const q = state.query.toLowerCase();
      state.filtered = state.all.filter(t => {
        const matchGenre  = state.genre === 'all' || t.genre === state.genre;
        const matchSearch = !q || t.title.toLowerCase().includes(q) || (t.artist ?? '').toLowerCase().includes(q);
        return matchGenre && matchSearch;
      });
      renderTracks(true);
    }

    function showEmpty() {
      const el = document.getElementById('emptyState');
      el.classList.remove('hidden'); el.classList.add('flex');
    }

    // ── Рендер списка ─────────────────────────────────────────────
    function renderTracks(animate = false) {
      document.getElementById('skeleton').innerHTML = '';
      const el = document.getElementById('emptyState');
      el.classList.add('hidden'); el.classList.remove('flex');

      if (!state.filtered.length) { showEmpty(); document.getElementById('trackList').innerHTML = ''; return; }

      const activeId = state.idx >= 0 ? (state.filtered[state.idx]?.id ?? '') : '';

      document.getElementById('trackList').innerHTML = state.filtered.map((t, i) => {
        const active = t.id === activeId;
        const thumb  = t.thumbnail_file_id ? `${API}/api/thumbnail/${t.thumbnail_file_id}` : '';
        const dur    = fmt(t.duration);
        return `
          <div data-track-row data-id="${t.id}"
               class="tap ${animate ? 'fade-up' : ''} flex items-center gap-3 p-3 rounded-2xl"
               style="${animate ? `animation-delay:${i * 35}ms;` : ''}
                      background:${active ? 'rgba(94,129,255,0.1)' : 'rgba(255,255,255,0.04)'};
                      border:1px solid ${active ? 'rgba(94,129,255,0.28)' : 'rgba(255,255,255,0.06)'};"
               onclick="playTrack(${i})">

            <!-- Обложка -->
            <div class="relative flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden ${gClass(i)}">
              ${thumb ? `<img src="${thumb}" class="w-full h-full object-cover"
                              onerror="this.style.display='none'" loading="lazy" alt="" />` : ''}
              ${active ? `<div class="absolute inset-0 flex items-center justify-center"
                               style="background:rgba(0,0,0,.42);">
                            <div class="flex items-end gap-[3px] h-[18px]">
                              <div class="eq-bar h-2 ${!state.playing ? 'paused' : ''}"></div>
                              <div class="eq-bar h-4 ${!state.playing ? 'paused' : ''}"></div>
                              <div class="eq-bar h-3 ${!state.playing ? 'paused' : ''}"></div>
                            </div>
                          </div>` : ''}
            </div>

            <!-- Инфо -->
            <div class="flex-1 min-w-0">
              <p class="text-[13px] font-semibold truncate"
                 style="color:${active ? 'var(--accent)' : '#fff'}">${esc(t.title)}</p>
              <p class="text-[11px] mt-0.5 truncate" style="color:var(--muted)">${esc(t.artist ?? 'Unknown Artist')}</p>
            </div>

            ${dur ? `<span class="text-[11px] flex-shrink-0" style="color:var(--muted)">${dur}</span>` : ''}
          </div>`;
      }).join('');
    }

    // ── Воспроизведение ───────────────────────────────────────────
    const audioEl = document.getElementById('audioEl');

    async function playTrack(i) {
      if (i < 0 || i >= state.filtered.length) return;
      haptic('medium');
      const t = state.filtered[i];
      state.idx = i;

      audioEl.src = `${API}/api/stream/${t.audio_file_id}`;
      audioEl.load();

      // Мини-плеер
      document.getElementById('miniTitle').textContent  = t.title;
      document.getElementById('miniArtist').textContent = t.artist ?? 'Unknown Artist';
      const miniArt = document.getElementById('miniArt');
      miniArt.innerHTML = '';
      miniArt.className = 'w-12 h-12 rounded-[14px] overflow-hidden ' + gClass(i);
      setArt(miniArt, t.thumbnail_file_id, i);

      // Полный плеер
      document.getElementById('fullTitle').textContent  = t.title;
      document.getElementById('fullArtist').textContent = t.artist ?? 'Unknown Artist';
      document.getElementById('totalTime').textContent  = fmt(t.duration) || '0:00';
      const fullArt = document.getElementById('fullArt');
      fullArt.className = 'w-full rounded-3xl overflow-hidden ' + gClass(i);
      setArt(fullArt, t.thumbnail_file_id, i);

      updateLikeIcon(t.id);

      // Показываем мини-плеер
      const mp = document.getElementById('miniPlayer');
      if (mp.classList.contains('hidden')) {
        mp.classList.remove('hidden');
        mp.classList.add('slide-up');
      }

      try {
        await audioEl.play();
      } catch { /* autoplay blocked */ }
    }

    async function togglePlay() {
      haptic('light');
      if (audioEl.paused) {
        if (!audioEl.src) return;
        try { await audioEl.play(); } catch {}
      } else {
        audioEl.pause();
      }
    }

    function playNext() {
      haptic('light');
      if (!state.filtered.length) return;
      const next = state.shuffle
        ? Math.floor(Math.random() * state.filtered.length)
        : (state.idx + 1) % state.filtered.length;
      playTrack(next);
    }

    function playPrev() {
      haptic('light');
      if (audioEl.currentTime > 3) { audioEl.currentTime = 0; return; }
      const prev = (state.idx - 1 + state.filtered.length) % state.filtered.length;
      playTrack(prev);
    }

    // ── Аудио события ────────────────────────────────────────────
    audioEl.addEventListener('play', () => {
      state.playing = true;
      syncPlayIcons(true);
      renderTracks(false);
    });

    audioEl.addEventListener('pause', () => {
      state.playing = false;
      syncPlayIcons(false);
      renderTracks(false);
    });

    audioEl.addEventListener('ended', () => {
      if (state.repeat) { audioEl.currentTime = 0; audioEl.play(); }
      else playNext();
    });

    audioEl.addEventListener('loadedmetadata', () => {
      document.getElementById('totalTime').textContent = fmt(audioEl.duration);
    });

    audioEl.addEventListener('timeupdate', () => {
      if (state.seeking || !audioEl.duration) return;
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      document.getElementById('miniProgress').style.width = `${pct}%`;
      const slider = document.getElementById('progressSlider');
      slider.value = pct;
      slider.style.setProperty('--pct', `${pct}%`);
      document.getElementById('curTime').textContent = fmt(audioEl.currentTime);
    });

    function syncPlayIcons(playing) {
      const PLAY_FULL  = '<path d="M7 3.5l16 9.5-16 9.5V3.5z" fill="white"/>';
      const PAUSE_FULL = '<rect x="5" y="3" width="5" height="20" rx="2.5" fill="white"/><rect x="16" y="3" width="5" height="20" rx="2.5" fill="white"/>';
      const PLAY_MINI  = '<path d="M4 2.5l8 5-8 5V2.5z" fill="white"/>';
      const PAUSE_MINI = '<rect x="3" y="2" width="3.5" height="11" rx="1.75" fill="white"/><rect x="8.5" y="2" width="3.5" height="11" rx="1.75" fill="white"/>';

      document.getElementById('fullPlayIcon').innerHTML  = playing ? PAUSE_FULL : PLAY_FULL;
      document.getElementById('miniPlayIcon').innerHTML  = playing ? PAUSE_MINI : PLAY_MINI;

      const eq = document.getElementById('miniEq');
      eq.classList.toggle('hidden',   !playing);
      eq.classList.toggle('flex',      playing);
      eq.querySelectorAll('.eq-bar').forEach(b => b.classList.toggle('paused', !playing));
    }

    function onSeek(v) {
      state.seeking = true;
      if (audioEl.duration) {
        audioEl.currentTime = (v / 100) * audioEl.duration;
        document.getElementById('curTime').textContent = fmt(audioEl.currentTime);
      }
      const slider = document.getElementById('progressSlider');
      slider.style.setProperty('--pct', `${v}%`);
      requestAnimationFrame(() => { state.seeking = false; });
    }

    // ── Полный плеер ─────────────────────────────────────────────
    function openFullPlayer() {
      haptic('light');
      document.getElementById('fullPlayer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeFullPlayer() {
      document.getElementById('fullPlayer').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Свайп вниз для закрытия
    let swipeY = 0;
    const fp = document.getElementById('fullPlayer');
    fp.addEventListener('touchstart', e => { swipeY = e.touches[0].clientY; }, { passive: true });
    fp.addEventListener('touchend',   e => {
      if (e.changedTouches[0].clientY - swipeY > 72) closeFullPlayer();
    }, { passive: true });

    // ── Shuffle / Repeat ─────────────────────────────────────────
    function toggleShuffle() {
      haptic('light');
      state.shuffle = !state.shuffle;
      const btn = document.getElementById('shuffleBtn');
      btn.style.background = state.shuffle ? 'rgba(94,129,255,0.18)' : 'transparent';
      btn.querySelectorAll('path').forEach(p => p.setAttribute('stroke', state.shuffle ? 'var(--accent)' : 'var(--muted)'));
    }

    function toggleRepeat() {
      haptic('light');
      state.repeat = !state.repeat;
      const btn  = document.getElementById('repeatBtn');
      btn.style.background = state.repeat ? 'rgba(94,129,255,0.18)' : 'transparent';
      const col = state.repeat ? 'var(--accent)' : 'var(--muted)';
      btn.querySelectorAll('path').forEach(p => p.setAttribute('stroke', col));
    }

    // ── Лайки ────────────────────────────────────────────────────
    function toggleLike() {
      haptic('medium');
      const t = state.filtered[state.idx];
      if (!t) return;
      state.liked.has(t.id) ? state.liked.delete(t.id) : state.liked.add(t.id);
      localStorage.setItem('ms_liked', JSON.stringify([...state.liked]));
      updateLikeIcon(t.id);
    }

    function updateLikeIcon(id) {
      const liked = state.liked.has(id);
      document.getElementById('likeIcon').innerHTML = liked
        ? '<path d="M12 21C12 21 3 15 3 9a4.5 4.5 0 0 1 9-1 4.5 4.5 0 0 1 9 1c0 6-9 12-9 12Z" fill="#FF453A" stroke="#FF453A" stroke-width="1.5" stroke-linejoin="round"/>'
        : '<path d="M12 21C12 21 3 15 3 9a4.5 4.5 0 0 1 9-1 4.5 4.5 0 0 1 9 1c0 6-9 12-9 12Z" stroke="var(--muted)" stroke-width="1.5" stroke-linejoin="round"/>';
    }

    // ── Поиск ────────────────────────────────────────────────────
    function toggleSearch() {
      haptic('light');
      const bar = document.getElementById('searchBar');
      bar.classList.toggle('hidden');
      if (!bar.classList.contains('hidden')) {
        setTimeout(() => document.getElementById('searchInput').focus(), 50);
      } else {
        state.query = '';
        document.getElementById('searchInput').value = '';
        applyFilter();
      }
    }

    function onSearch(v) {
      state.query = v;
      applyFilter();
    }

    // ── Старт ────────────────────────────────────────────────────
    renderGenres();
    loadTracks();
  </script>
</body>
</html>
